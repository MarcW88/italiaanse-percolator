<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italiaanse Percolator Kopen | 64 Geteste Modellen</title>
    <meta name="description" content="Italiaanse percolator kopen? Ontdek onze selectie van 64 geteste modellen. Expert reviews, prijsvergelijking en koopadvies voor de perfecte percolator.">
    <link rel="canonical" href="https://italiaanse-percolator.nl/italiaanse-percolator-kopen.html">
    <script>
        // Redirection immédiate vers boutique.html
        window.location.replace('boutique.html');
    </script>
</head>
<body>
    <p>Redirecting to our shop...</p>
<script>
const mobileMenuToggle = document.querySelector('.mobile-menu-toggle');
const mobileMenuOverlay = document.querySelector('.mobile-menu-overlay');
const navMenu = document.querySelector('.nav-menu');

if (mobileMenuToggle) {
    mobileMenuToggle.addEventListener('click', () => {
        mobileMenuToggle.classList.toggle('active');
        navMenu.classList.toggle('active');
        mobileMenuOverlay.classList.toggle('active');
        document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : '';
    });
}

if (mobileMenuOverlay) {
    mobileMenuOverlay.addEventListener('click', () => {
        mobileMenuToggle.classList.remove('active');
        navMenu.classList.remove('active');
        mobileMenuOverlay.classList.remove('active');
        document.body.style.overflow = '';
    });
}

// Mobile dropdown toggle
const dropdownToggles = document.querySelectorAll('.dropdown-toggle');
dropdownToggles.forEach(toggle => {
    toggle.addEventListener('click', (e) => {
        if (window.innerWidth <= 768) {
            e.preventDefault();
            const dropdownItem = toggle.closest('.nav-item.dropdown');
            dropdownItem.classList.toggle('active');
            const dropdownMenu = dropdownItem.querySelector('.dropdown-menu');
            dropdownMenu.classList.toggle('active');
        }
    });
});
</script>
</body>
</html>
